name = "z-vault-pro-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
# ✅ TESTNET — switch to 'mainnet' only after deploying ZVaultRelayer.sol to Mainnet
NETWORK_MODE = "mainnet"

# Netts.io Energy Aggregator
NETTS_API_URL = "https://netts.io/apiv2"

# Feee.io Fallback Energy API
FEEE_API_URL = "https://api.feee.io"

# USDT Contracts
USDT_CONTRACT_TESTNET = "TXYZopYRdj2D9XRtbG411XZZ3kM5VkAeBf"
USDT_CONTRACT_MAINNET = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t"

# ZVaultRelayer Contract Addresses
# ✅ Nile Testnet: deployed
RELAYER_CONTRACT_TESTNET = "TZ2KnAvkher2xBdWk5j6SQvH9Amyoz1pz5"
# ⚠️ Mainnet: NOT YET DEPLOYED. Deploy ZVaultRelayer.sol then update this.
RELAYER_CONTRACT_MAINNET = "TZ2KnAvkher2xBdWk5j6SQvH9Amyoz1pz5"

# Relayer Wallet Address (must match ZVaultRelayer.authorizedRelayer)
RELAYER_ADDRESS = "TMju4dk4gfs2nyiocnaJjTdQTHK1EYH89N"

# Dynamic Fee Slabs
FEE_THRESHOLD_USDT = "5000.00"
FEE_TIER_1_USDT = "1.00"
FEE_TIER_2_USDT = "2.00"
ACTIVATION_FEE_USDT = "2.00"

# Internal cost baseline (avg energy rental cost in USDT)
GASFREE_BASE_FEE = "0.60"

# RPC
MAINNET_RPC_URL = "https://api.trongrid.io"
USDT_CONTRACT = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t"

# Secrets — set via: wrangler secret put <NAME>
# RELAYER_PRIVATE_KEY   → private key of the relayer wallet (never hardcode!)
# TREASURY_ADDRESS      → wallet that receives fees
# NETTS_API_KEY         → Netts.io API key
# VPS_PROXY_URL         → https://your-domain.com/rent
# VPS_SHARED_SECRET     → random 32+ char string, validated by VPS Express server

[[d1_databases]]
binding = "DB"
database_name = "z-vault-pro-db"
database_id = "72c28dc1-51bb-410f-a65b-0c3c0aeb3d51"

[dev]
port = 8787
